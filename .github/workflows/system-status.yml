name: System Status Probes

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  status-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # Scope to status module only — full `npm test` has unrelated legacy failures
      - run: npm run test:status

  system-probes:
    needs: status-tests
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run system health probes
        run: npm run status:probe
        env:
          CI: 'true'
          STATUS_PROBE_CI_LENIENT: 'true'
          STATUS_PROBE_TRIGGER: github_push
          STATUS_AI_PROBE_ENABLED: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          STATUS_PROBE_BASE_URL: ${{ secrets.STATUS_PROBE_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PORTKEY_API_KEY: ${{ secrets.PORTKEY_API_KEY }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_CHAT_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_CHAT_DEPLOYMENT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APPS_SUPABASE_URL: ${{ secrets.APPS_SUPABASE_URL }}
          APPS_SUPABASE_SERVICE_KEY: ${{ secrets.APPS_SUPABASE_SERVICE_KEY }}
          APPS_SUPABASE_JWT_SECRET: ${{ secrets.APPS_SUPABASE_JWT_SECRET }}
          REPOSITORY_SUPABASE_JWT_SECRET: ${{ secrets.REPOSITORY_SUPABASE_JWT_SECRET }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          REPOSITORY_SUPABASE_ANON_KEY: ${{ secrets.REPOSITORY_SUPABASE_ANON_KEY }}
